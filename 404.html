    <link rel="stylesheet" type="text/css" href="/style.css">

<body>
    <header class="fade-in">
        <a href="/" class="logo-link">

        <nav>

            <a href="/#communities">Communities</a>
            <a href="/#goals">Goals</a>
            <a href="/#join">Join</a>
            <div class="lang-switcher">

            <h1 class="slide-up">404</h1>

            <a href="/" class="button slide-up delay-600">Back to Home</a>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <span class="footer-name">Bitcoin Payments Alliance</span>
            <nav class="footer-nav">

    <script>
        document.querySelector('.nav-toggle').addEventListener('click', function () {
            document.querySelector('header nav').classList.toggle('open');
        });
        document.querySelectorAll('.lang-switcher').forEach(function (el) {
            el.addEventListener('click', function (e) { e.stopPropagation(); el.classList.toggle('open'); });
        });
        document.addEventListener('click', function () {
            document.querySelectorAll('.lang-switcher').forEach(function (el) { el.classList.remove('open'); });
        });
    </script>

</html>
